function genHeat(peakHours, peakVal, base=0.1, noise=0.08) {
  const out = [];
  for (let h = 9; h <= 21; h++) {
    let v = base;
    peakHours.forEach(([ph, w, pv]) => {
      v += (pv ?? peakVal) * Math.exp(-Math.pow((h-ph)/w, 2));
    });
    v += (Math.sin(h*1.7+peakHours[0][0])*0.5+0.5) * noise;
    out.push(Math.max(0, Math.min(1, v)));
  }
  return out;
}

function heatColor(v) {
  v = Math.max(0, Math.min(1, v));
  const stops = [
    { t: 0.00, c: [76, 29, 149] },
    { t: 0.30, c: [109, 40, 217] },
    { t: 0.55, c: [8, 145, 178] },
    { t: 0.80, c: [34, 211, 238] },
    { t: 1.00, c: [250, 204, 21] },
  ];
  for (let i = 0; i < stops.length - 1; i++) {
    const a = stops[i], b = stops[i+1];
    if (v >= a.t && v <= b.t) {
      const k = (v - a.t) / (b.t - a.t);
      const r = Math.round(a.c[0] + (b.c[0]-a.c[0])*k);
      const g = Math.round(a.c[1] + (b.c[1]-a.c[1])*k);
      const bl= Math.round(a.c[2] + (b.c[2]-a.c[2])*k);
      return `rgb(${r},${g},${bl})`;
    }
  }
  return 'rgb(250,204,21)';
}

      <div style={{flex:1}}/>

      <div className="btn btn-ghost">
        <Icon name="clock" size={14} />
        <span className="mono" style={{fontSize:12}}>2026.04.15 – 04.21</span>
        <Icon name="down" size={12} />
      </div>

      <div className="seg">
        <button className={compareMode==='off' ? 'active' : ''} onClick={()=>setCompareMode('off')}>단일</button>
        <button className={compareMode==='dod' ? 'active' : ''} onClick={()=>setCompareMode('dod')}>오늘 vs 어제</button>
        <button className={compareMode==='wow' ? 'active' : ''} onClick={()=>setCompareMode('wow')}>평일 vs 주말</button>
      </div>

      <button className="btn btn-ghost" title="알림"><Icon name="bell" size={15} /></button>
      <button className="btn btn-ghost" title="설정"><Icon name="settings" size={15} /></button>
      <div style={{
        width:32, height:32, borderRadius:'50%',
        background:'linear-gradient(135deg, #22D3EE, #3B82F6)',
        display:'grid', placeItems:'center', color:'#0A0F1C', fontSize:12, fontWeight:700
      }}>JH</div>
    </header>
  );
};

const SidebarSection = ({ title, children, action }) => (
  <div style={{padding:'18px 20px', borderBottom:'1px solid var(--border)'}}>
    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
      <div style={{fontSize:11, fontWeight:600, letterSpacing:'0.08em', color:'var(--text-3)', textTransform:'uppercase'}}>{title}</div>
      {action}
    </div>
    {children}
  </div>
);

const FloorPicker = ({ value, onChange }) => {
  const floors = ['RF','7F','6F','5F','4F','3F','2F','1F','B1'];
  return (
    <div style={{display:'flex', flexDirection:'column', gap:4}}>
      {floors.map(f => {
        const active = f === value;
        const isSixth = f === '6F';
        return (
          <button key={f} onClick={()=>onChange(f)}
            style={{
              appearance:'none', border:'none', cursor:'pointer',
              background: active ? 'linear-gradient(90deg, rgba(59,130,246,0.18), rgba(59,130,246,0))' : 'transparent',
              color: active ? 'var(--text)' : 'var(--text-2)',
              padding:'8px 10px', borderRadius:8, textAlign:'left',
              display:'flex', alignItems:'center', justifyContent:'space-between',
              fontFamily:'inherit', fontSize:13, fontWeight: active ? 600 : 500,
              borderLeft: active ? '2px solid var(--primary)' : '2px solid transparent'
            }}>
            <span className="mono">{f}</span>
            <span className="mono" style={{fontSize:11, color: active ? 'var(--cyan)' : 'var(--text-3)'}}>
              {isSixth ? '11,230' : ['2.1k','3.4k','—','5.2k','4.8k','3.9k','6.1k','12k','1.2k'][floors.indexOf(f)]}
            </span>
          </button>
        );
      })}
    </div>
  );
};

const SpaceTypeFilter = ({ value, onChange }) => {
  const types = [
    { k:'all',   label:'전체',   c:'var(--text)' },
    { k:'업무',  label:'업무',   c:'#3B82F6' },
    { k:'협업',  label:'협업',   c:'#22D3EE' },
    { k:'편의',  label:'편의',   c:'#FACC15' },
    { k:'특수',  label:'특수',   c:'#8B5CF6' },
    { k:'공용',  label:'공용',   c:'#64748B' },
  ];
  return (
    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6}}>
      {types.map(t => {
        const active = value === t.k;
        return (
          <button key={t.k} onClick={()=>onChange(t.k)}
            style={{
              appearance:'none', cursor:'pointer',
              background: active ? 'rgba(59,130,246,0.1)' : 'var(--bg-2)',
              border: `1px solid ${active ? 'rgba(59,130,246,0.4)' : 'var(--border)'}`,
              color: active ? 'var(--text)' : 'var(--text-2)',
              padding:'7px 10px', borderRadius:8, fontFamily:'inherit', fontSize:12,
              display:'flex', alignItems:'center', gap:6, justifyContent:'flex-start'
            }}>
            <span className="dot" style={{background: t.c, boxShadow: active ? `0 0 8px ${t.c}` : 'none'}}/>
            {t.label}
          </button>
        );
      })}
    </div>
  );
};

const DayToggles = ({ value, onChange }) => {
  const days = ['월','화','수','목','금','토','일'];
  return (
    <div style={{display:'flex', gap:4}}>
      {days.map((d,i) => {
        const on = value.includes(i);
        const weekend = i >= 5;
        return (
          <button key={d} onClick={()=>onChange(on ? value.filter(x=>x!==i) : [...value,i])}
            style={{
              flex:1, height:32, appearance:'none', cursor:'pointer',
              background: on ? (weekend ? 'rgba(250,204,21,0.14)' : 'rgba(59,130,246,0.14)') : 'var(--bg-2)',
              border:`1px solid ${on ? (weekend ? 'rgba(250,204,21,0.4)' : 'rgba(59,130,246,0.4)') : 'var(--border)'}`,
              color: on ? (weekend ? 'var(--yellow)' : 'var(--text)') : 'var(--text-3)',
              borderRadius:7, fontFamily:'inherit', fontSize:12, fontWeight:600
            }}>{d}</button>
        );
      })}
    </div>
  );
};

const RangeSlider = ({ min, max, value, onChange, format }) => {
  const [a, b] = value;
  const pct = v => ((v-min)/(max-min))*100;
  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', marginBottom:8}}>
        <span className="mono" style={{fontSize:12, color:'var(--text)', fontWeight:600}}>{format ? format(a) : a}</span>
        <span className="mono" style={{fontSize:12, color:'var(--text)', fontWeight:600}}>{format ? format(b) : b}</span>
      </div>
      <div style={{position:'relative', height:22}}>
        <div style={{position:'absolute', left:0, right:0, top:10, height:3, borderRadius:2, background:'var(--bg-2)'}}/>
        <div style={{position:'absolute', top:10, height:3, borderRadius:2,
          left:`${pct(a)}%`, right:`${100-pct(b)}%`,
          background:'linear-gradient(90deg, var(--cyan), var(--primary))'}}/>
        <input type="range" min={min} max={max} value={a}
          onChange={e=>onChange([Math.min(+e.target.value, b-1), b])}
          style={{position:'absolute', inset:0, appearance:'none', background:'transparent', pointerEvents:'all'}}/>
        <input type="range" min={min} max={max} value={b}
          onChange={e=>onChange([a, Math.max(+e.target.value, a+1)])}
          style={{position:'absolute', inset:0, appearance:'none', background:'transparent', pointerEvents:'all'}}/>
        {[a,b].map((v,i) => (
          <div key={i} style={{
            position:'absolute', top:4, left:`calc(${pct(v)}% - 8px)`,
            width:16, height:16, borderRadius:'50%',
            background:'#fff', border:'3px solid var(--primary)',
            boxShadow:'0 2px 8px rgba(0,0,0,0.4)', pointerEvents:'none'
          }}/>
        ))}
      </div>
      <style>{`
        input[type="range"]::-webkit-slider-thumb { appearance:none; width:22px; height:22px; background:transparent; cursor:grab; }
        input[type="range"]::-webkit-slider-runnable-track { background:transparent; }
      `}</style>
    </div>
  );
};

const Sidebar = ({ state, dispatch }) => {
  return (
    <aside style={{
      width:280, flex:'none',
      background:'linear-gradient(180deg, var(--bg-2), var(--bg))',
      borderRight:'1px solid var(--border)',
      display:'flex', flexDirection:'column',
      position:'relative', zIndex: 20
    }}>
      <SidebarSection title="층 선택" action={
        <span className="chip"><span className="dot" style={{background:'var(--cyan)'}}/>LIVE</span>
      }>
        <FloorPicker value={state.floor} onChange={f=>dispatch({floor:f})}/>
      </SidebarSection>

      <SidebarSection title="공간 유형">
        <SpaceTypeFilter value={state.spaceType} onChange={t=>dispatch({spaceType:t})}/>
      </SidebarSection>

      <SidebarSection title="요일">
        <DayToggles value={state.days} onChange={d=>dispatch({days:d})}/>
      </SidebarSection>

      <SidebarSection title="시간대">
        <RangeSlider min={7} max={22} value={state.hourRange}
          onChange={r=>dispatch({hourRange:r})}
          format={h => `${String(h).padStart(2,'0')}:00`}/>
      </SidebarSection>

      <SidebarSection title="표시 지표">
        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {[
            { k:'occupancy', label:'점유 밀도', icon:'heat' },
            { k:'dwell',     label:'체류 시간', icon:'clock' },
            { k:'flow',      label:'동선 흐름', icon:'flow' },
          ].map(m => {
            const on = state.metric === m.k;
            return (
              <button key={m.k} onClick={()=>dispatch({metric:m.k})}
                style={{
                  appearance:'none', cursor:'pointer',
                  background: on ? 'rgba(34,211,238,0.08)' : 'transparent',
                  border:`1px solid ${on ? 'rgba(34,211,238,0.25)' : 'var(--border)'}`,
                  color: on ? 'var(--text)' : 'var(--text-2)',
                  padding:'10px 12px', borderRadius:10, fontFamily:'inherit', fontSize:13,
                  display:'flex', alignItems:'center', gap:10, textAlign:'left'
                }}>
                <Icon name={m.icon} size={16} style={{color: on ? 'var(--cyan)' : 'var(--text-3)'}}/>
                {m.label}
                {on && <span className="mono" style={{marginLeft:'auto', fontSize:11, color:'var(--cyan)'}}>ON</span>}
              </button>
            );
          })}
        </div>
      </SidebarSection>

      <div style={{marginTop:'auto', padding:'16px 20px', borderTop:'1px solid var(--border)', display:'flex', alignItems:'center', gap:10}}>
        <Icon name="wifi" size={14} style={{color:'var(--cyan)'}}/>
        <div style={{fontSize:11, color:'var(--text-2)', lineHeight:1.4}}>
          <div style={{color:'var(--text)', fontWeight:500}}>센서 284 / 286 연결</div>
          <div className="mono" style={{color:'var(--text-3)', fontSize:10}}>업데이트 12초 전</div>
        </div>
      </div>
    </aside>
  );
};

Object.assign(window, { Header, Sidebar, SidebarSection });
  </script>

    ctx.clearRect(0, 0, W, H);

    const idx = Math.max(0, Math.min(12, hour - 9));

    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const octx = off.getContext('2d');
    octx.clearRect(0, 0, W, H);

    SPACES.forEach(s => {

      if (v < 0.02) return;
      const cx = s.x + s.w/2, cy = s.y + s.h/2;
      const baseR = Math.max(s.w, s.h) * 0.95;
      drawBlob(octx, cx, cy, baseR, v);
      drawBlob(octx, cx - s.w*0.3, cy + s.h*0.25, baseR*0.75, v*0.75);

      const [r, g, b] = heatColorRGB(v);
      d[i] = r; d[i+1] = g; d[i+2] = b;
      d[i+3] = Math.min(255, 60 + v * 235);

    octx.putImageData(imd, 0, 0);

    ctx.drawImage(off, 0, 0, W, H);

    ctx.drawImage(maskRef.current, 0, 0, W, H);

        mixBlendMode:'screen', pointerEvents:'none',
        filter:'blur(0.5px)',

function drawBlob(ctx, cx, cy, r, v) {
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  const a = Math.min(1, v);
  grd.addColorStop(0.00, `rgba(255,255,255,${a})`);
  grd.addColorStop(0.45, `rgba(255,255,255,${a*0.45})`);
  grd.addColorStop(1.00, `rgba(255,255,255,0)`);
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
}

function heatColorRGB(v) {
  v = Math.max(0, Math.min(1, v));
  const stops = [
    { t: 0.00, c: [46, 16, 101] },
    { t: 0.25, c: [88, 28, 135] },
    { t: 0.45, c: [30, 64, 175] },
    { t: 0.60, c: [8, 145, 178] },
    { t: 0.78, c: [34, 211, 238] },
    { t: 0.92, c: [163, 230, 53] },
    { t: 1.00, c: [250, 204, 21] },
  ];
  for (let i = 0; i < stops.length - 1; i++) {
    const a = stops[i], b = stops[i+1];
    if (v >= a.t && v <= b.t) {
      const k = (v - a.t) / (b.t - a.t);
      return [
        Math.round(a.c[0] + (b.c[0]-a.c[0])*k),
        Math.round(a.c[1] + (b.c[1]-a.c[1])*k),
        Math.round(a.c[2] + (b.c[2]-a.c[2])*k),
      ];
    }
  }
  return [250, 204, 21];
}

const KpiChip = ({label, value, sub, accent}) => {
  const col = accent==='cyan' ? 'var(--cyan)' : accent==='yellow' ? 'var(--yellow)' : 'var(--primary)';
  return (
    <div style={{
      background:'rgba(10,15,28,0.78)', backdropFilter:'blur(6px)',
      border:'1px solid var(--border-strong)', borderRadius:10,
      padding:'8px 12px', minWidth:110
    }}>
      <div style={{fontSize:10, color:'var(--text-3)', fontWeight:500, letterSpacing:'0.05em', textTransform:'uppercase'}}>{label}</div>
      <div style={{display:'flex', alignItems:'baseline', gap:4, marginTop:2}}>
        <span className="mono" style={{fontSize:20, fontWeight:700, color: col}}>{value}</span>
        <span style={{fontSize:11, color:'var(--text-2)'}}>{sub}</span>
      </div>
    </div>
  );
};

const Timeline = ({ hour, setHour }) => {
  const hours = HOURS;
  const pct = (hour - 9) / 12 * 100;
  return (
    <div style={{position:'relative', height:52}}>
      <div style={{position:'absolute', top:10, left:0, right:0, display:'flex', justifyContent:'space-between'}}>
        {hours.map(h => (
          <div key={h} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:3}}>
            <div style={{width:1, height: h%3===0 ? 8 : 4, background: h===hour ? 'var(--yellow)' : 'rgba(255,255,255,0.15)'}}/>
            <span className="mono" style={{fontSize:10, color: h===hour ? 'var(--text)' : 'var(--text-3)', fontWeight: h===hour?700:500}}>
              {String(h).padStart(2,'0')}
            </span>
          </div>
        ))}
      </div>
      <div style={{position:'absolute', top:30, left:6, right:6, height:4, borderRadius:2, background:'var(--bg-2)'}}/>
      <div style={{position:'absolute', top:30, left:6, width:`calc(${pct}% - 6px)`, height:4, borderRadius:2,
        background:'linear-gradient(90deg, #6D28D9, #0891B2, #22D3EE, #FACC15)'}}/>
      <input type="range" min={9} max={21} step={1} value={hour}
        onChange={e=>setHour(+e.target.value)}
        style={{position:'absolute', top:22, left:0, right:0, width:'100%', appearance:'none', background:'transparent', height:20, cursor:'pointer'}}/>
      <div style={{
        position:'absolute', top:24, left:`calc(${pct}% - 10px)`,
        width:20, height:20, borderRadius:'50%',
        background:'radial-gradient(circle, #FACC15 0%, #22D3EE 100%)',
        border:'2px solid #0A0F1C',
        boxShadow:'0 0 16px rgba(250,204,21,0.6)', pointerEvents:'none',
        display:'grid', placeItems:'center',
      }}>
        <div style={{
          position:'absolute', top:-26, left:'50%', transform:'translateX(-50%)',
          background:'var(--bg-2)', border:'1px solid var(--border-strong)',
          padding:'2px 8px', borderRadius:6, whiteSpace:'nowrap'
        }}>
          <span className="mono" style={{fontSize:11, color:'var(--yellow)', fontWeight:700}}>{String(hour).padStart(2,'0')}:00</span>
        </div>
      </div>
    </div>
  );
};

const FloorHeatmap = ({ hour, setHour, playing, setPlaying, selected, setSelected }) => {
  const [hovered, setHovered] = useState(null);
  const [mouse, setMouse] = useState(null);
  const svgRef = useRef(null);

  useEffect(() => {
    if (!playing) return;
    const t = setInterval(() => {
      setHour(h => (h >= 21 ? 9 : h + 1));
    }, 900);
    return () => clearInterval(t);
  }, [playing]);

  const onSpaceEnter = (s, e) => {
    setHovered(s.id);
    const rect = svgRef.current.getBoundingClientRect();
    setMouse({ x: e.clientX - rect.left, y: e.clientY - rect.top, space: s });
  };
  const onSpaceMove = (s, e) => {
    const rect = svgRef.current.getBoundingClientRect();
    setMouse({ x: e.clientX - rect.left, y: e.clientY - rect.top, space: s });
  };

  return (
    <div className="card" style={{padding:'20px 20px 18px', gridColumn:'span 12', position:'relative'}}>
      <div style={{display:'flex', alignItems:'flex-start', gap:16, marginBottom:14}}>
        <div>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:4}}>
            <div className="card-title" style={{fontSize:15, color:'var(--text)', fontWeight:700}}>도면 히트맵</div>
            <span className="chip"><Icon name="heat" size={11} style={{color:'var(--yellow)'}}/>점유 밀도</span>
            <span className="chip" style={{color:'var(--cyan)'}}><span className="dot" style={{background:'var(--cyan)', animation:'pulse-soft 2s infinite'}}/>실시간</span>
            <span className="chip mono" style={{fontSize:10}}>A-604 · 101동 지상 1층</span>
          </div>
          <div className="card-caption">Gansam 건축도면 기반 · 실시간 센서 94개 · 가중 Gaussian 보간</div>
        </div>
        <div style={{flex:1}}/>
        <div style={{display:'flex', gap:6}}>
          <button className="btn btn-ghost"><Icon name="eye" size={14}/>3D</button>
          <button className="btn btn-ghost"><Icon name="download" size={14}/>내보내기</button>
          <button className="btn btn-ghost" style={{padding:'7px 9px'}}><Icon name="dots" size={14}/></button>
        </div>
      </div>

        position:'relative', borderRadius:12, overflow:'hidden',
        background:'radial-gradient(circle at 50% 50%, #0D1424 0%, #06090F 100%)',

        <svg viewBox="0 0 1000 707" width="100%" height="100%" style={{position:'relative', display:'block'}}>
          <defs>
            <linearGradient id="selBorder" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stopColor="#22D3EE"/>
              <stop offset="1" stopColor="#FACC15"/>
            </linearGradient>
          </defs>

          {SPACES.map(s => {
            const isHov = hovered === s.id;
            const isSel = selected === s.id;
            const idx = Math.max(0, Math.min(12, hour - 9));
            const v = HEAT_BY_SPACE[s.id][idx];
            return (
              <g key={s.id}>
                {(isHov || isSel) && (
                  <rect x={s.x-2} y={s.y-2} width={s.w+4} height={s.h+4}
                    rx={6}
                    fill="none"
                    stroke={isSel ? 'url(#selBorder)' : 'rgba(250,204,21,0.85)'}
                    strokeWidth={isSel ? 2 : 1.6}
                    style={{filter: isSel ? 'drop-shadow(0 0 14px rgba(250,204,21,0.7))' : 'drop-shadow(0 0 10px rgba(250,204,21,0.5))'}}
                  />
                )}
                <rect x={s.x} y={s.y} width={s.w} height={s.h}
                  fill="transparent" style={{cursor:'pointer'}}
                  onMouseEnter={(e)=>onSpaceEnter(s,e)}
                  onMouseMove={(e)=>onSpaceMove(s,e)}
                  onMouseLeave={()=>{setHovered(null); setMouse(null);}}
                  onClick={()=>setSelected(s.id === selected ? null : s.id)}
                />
                <circle cx={s.x + s.w/2} cy={s.y + s.h/2} r={3 + v*1.5}
                  fill={v > 0.65 ? '#FACC15' : v > 0.4 ? '#22D3EE' : '#A78BFA'}
                  stroke="rgba(10,15,28,0.9)" strokeWidth="1.5"
                  style={{pointerEvents:'none', filter:`drop-shadow(0 0 ${4+v*6}px currentColor)`}}/>
                <g style={{pointerEvents:'none'}}>

                    y={s.y + s.h/2 + 7}
                    width={s.name.length*8.4 + 14}
                    height={17} rx={8.5}
                    fill="rgba(8,12,22,0.88)"
                    stroke="rgba(255,255,255,0.18)"

  <script type="text/babel" data-presets="react" id="mod-timegrid">
const TimeGrid = () => {
  const [hover, setHover] = useState(null);
  const spaces = SPACES.slice().sort((a,b) => {
    const sumA = HEAT_BY_SPACE[a.id].reduce((s,v)=>s+v,0);
    const sumB = HEAT_BY_SPACE[b.id].reduce((s,v)=>s+v,0);
    return sumB - sumA;
  });

  let peak = { v: 0, hi: 0, si: 0 };
  spaces.forEach((s, si) => {
    HEAT_BY_SPACE[s.id].forEach((v, hi) => {
      if (v > peak.v) peak = { v, hi, si, s };
    });
  });

  return (
    <div className="card" style={{padding:'20px', gridColumn:'span 7'}}>
      <div style={{display:'flex', alignItems:'flex-start', marginBottom:14}}>
        <div>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:4}}>
            <div className="card-title" style={{fontSize:14, color:'var(--text)', fontWeight:700}}>시간대 × 공간</div>
            <span className="chip">점유 밀도</span>
          </div>
          <div className="card-caption">언제, 어디서 몰리는가 · 최근 7일 평균</div>
        </div>
        <div style={{flex:1}}/>
        <div className="seg">
          <button className="active">밀도</button>
          <button>증감률</button>
        </div>
      </div>

      <div style={{position:'relative'}}>
        <div style={{display:'grid', gridTemplateColumns:'88px repeat(13, 1fr)', gap:2, marginBottom:6}}>
          <div/>
          {HOURS.map(h => (
            <div key={h} className="mono" style={{
              fontSize:10, color: h === peak.hi+9 ? 'var(--yellow)' : 'var(--text-3)',
              textAlign:'center', fontWeight: h === peak.hi+9 ? 700 : 500
            }}>{String(h).padStart(2,'0')}</div>
          ))}
        </div>

        {spaces.map((s, si) => (
          <div key={s.id} style={{display:'grid', gridTemplateColumns:'88px repeat(13, 1fr)', gap:2, marginBottom:2}}>
            <div style={{
              fontSize:11, color:'var(--text-2)', fontWeight:500,
              paddingRight:8, textAlign:'right', lineHeight:'22px',
              whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'
            }}>{s.name}</div>
            {HEAT_BY_SPACE[s.id].map((v, hi) => {
              const isHover = hover && hover.si === si && hover.hi === hi;
              const isPeak = si === peak.si && hi === peak.hi;
              return (
                <div key={hi}
                  onMouseEnter={()=>setHover({si, hi, v, s})}
                  onMouseLeave={()=>setHover(null)}
                  style={{
                    height:22, borderRadius:3,
                    background: heatColor(v),
                    opacity: 0.45 + v*0.55,
                    cursor:'pointer',
                    outline: isHover ? '2px solid #fff' : isPeak ? '1px solid rgba(250,204,21,0.8)' : 'none',
                    outlineOffset: isHover ? -1 : 0,
                    boxShadow: isPeak ? '0 0 0 1px rgba(250,204,21,0.4), 0 0 12px rgba(250,204,21,0.35)' : 'none',
                    animation: isPeak ? 'pulse-soft 2.5s infinite' : 'none',
                    transition:'all 120ms ease'
                  }}
                />
              );
            })}
          </div>
        ))}

        <div style={{marginTop:12, padding:'10px 12px', background:'rgba(250,204,21,0.05)', border:'1px solid rgba(250,204,21,0.2)', borderRadius:10, display:'flex', alignItems:'center', gap:10}}>

              {Math.round(hover.v*100)}%
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

window.TimeGrid = TimeGrid;

  <!-- DWELL BARS -->
  <script type="text/babel" data-presets="react" id="mod-dwell">
const DwellBars = () => {
  const ranked = SPACES.slice().sort((a,b) => b.dwell - a.dwell).slice(0, 9);
  const max = Math.max(...ranked.map(s => s.dwell * 1.6));
  const [hoverIdx, setHoverIdx] = useState(null);

  const tag = (dwell) => {
    if (dwell >= 60) return { k:'deep', label:'몰입형', color:'#8B5CF6' };
    if (dwell >= 25) return { k:'stay', label:'정착형', color:'#22D3EE' };
    if (dwell >= 15) return { k:'flex', label:'유동형', color:'#3B82F6' };
    return { k:'pass', label:'경유형', color:'#64748B' };
  };

  return (
    <div className="card" style={{padding:'20px', gridColumn:'span 5'}}>
      <div style={{display:'flex', alignItems:'flex-start', marginBottom:14}}>
        <div>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:4}}>
            <div className="card-title" style={{fontSize:14, color:'var(--text)', fontWeight:700}}>체류 시간 분석</div>
          </div>
          <div className="card-caption">평균 / 최소~최대 · 단위: 분</div>
        </div>
        <div style={{flex:1}}/>
        <div className="mono" style={{display:'flex', gap:10, fontSize:10, color:'var(--text-3)'}}>
          <span><span style={{display:'inline-block', width:8, height:8, borderRadius:2, background:'#8B5CF6', marginRight:4}}/>몰입형</span>
          <span><span style={{display:'inline-block', width:8, height:8, borderRadius:2, background:'#22D3EE', marginRight:4}}/>정착형</span>
          <span><span style={{display:'inline-block', width:8, height:8, borderRadius:2, background:'#3B82F6', marginRight:4}}/>유동형</span>
          <span><span style={{display:'inline-block', width:8, height:8, borderRadius:2, background:'#64748B', marginRight:4}}/>경유형</span>
        </div>
      </div>

      <div style={{display:'flex', flexDirection:'column', gap:10}}>
        {ranked.map((s, i) => {
          const t = tag(s.dwell);
          const avgPct = s.dwell / max * 100;
          const minV = Math.max(2, Math.round(s.dwell * 0.4));
          const maxV = Math.round(s.dwell * 1.45);
          const minPct = minV / max * 100;
          const maxPct = maxV / max * 100;
          const hover = hoverIdx === i;
          return (
            <div key={s.id}
              onMouseEnter={()=>setHoverIdx(i)} onMouseLeave={()=>setHoverIdx(null)}
              style={{display:'grid', gridTemplateColumns:'88px 1fr auto', gap:12, alignItems:'center', cursor:'pointer'}}>
              <div style={{fontSize:12, color: hover ? 'var(--text)' : 'var(--text-2)', fontWeight:500, textAlign:'right', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                {s.name}
              </div>
              <div style={{position:'relative', height:22}}>
                <div style={{
                  position:'absolute', top:10, left:`${minPct}%`, width:`${maxPct-minPct}%`, height:2,
                  background: `linear-gradient(90deg, ${t.color}44, ${t.color})`, borderRadius:1
                }}/>
                <div style={{position:'absolute', top:6, left:`calc(${minPct}% - 1px)`, width:2, height:10, background:t.color, opacity:0.5}}/>
                <div style={{position:'absolute', top:6, left:`calc(${maxPct}% - 1px)`, width:2, height:10, background:t.color, opacity:0.5}}/>
                <div style={{
                  position:'absolute', top:3, left:0, width:`${avgPct}%`, height:16, borderRadius:4,
                  background:`linear-gradient(90deg, ${t.color}33, ${t.color})`,
                  boxShadow: hover ? `0 0 10px ${t.color}88` : 'none',
                  transition:'all 200ms ease'
                }}/>
                {hover && (
                  <div style={{position:'absolute', top:-22, left:`${avgPct}%`, transform:'translateX(-50%)',
                    background:'#0B1120', border:'1px solid var(--border-strong)', padding:'2px 6px',
                    borderRadius:5, fontSize:10, whiteSpace:'nowrap'}}>
                    <span className="mono" style={{color:t.color, fontWeight:700}}>{s.dwell}분</span>
                    <span style={{color:'var(--text-3)', marginLeft:4}}>· {minV}~{maxV}분</span>
                    <span style={{color:t.color, marginLeft:6, padding:'1px 5px', background:`${t.color}22`, borderRadius:3, fontWeight:600}}>{t.label}</span>
                  </div>
                )}
              </div>
              <div style={{display:'flex', alignItems:'center', gap:6, minWidth:80, justifyContent:'flex-end'}}>
                <span className="mono" style={{fontSize:14, fontWeight:700, color:'var(--text)'}}>{s.dwell}</span>
                <span style={{fontSize:10, color:'var(--text-3)'}}>분</span>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{marginTop:14, paddingTop:14, borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <div style={{fontSize:11, color:'var(--text-3)'}}>전체 평균 체류 <span className="mono" style={{color:'var(--text)', fontWeight:700, marginLeft:4}}>34.7분</span></div>
        <div className="mono" style={{fontSize:11, color:'var(--cyan)'}}>지난 주 대비 +6.2%</div>
      </div>
    </div>
  );
};

window.DwellBars = DwellBars;
  </script>

              ))}

            {Object.entries(flowMatrix).map(([k, c]) => {
              const [fid, tid] = k.split('→');
              const a = SPACES.find(s=>s.id===fid);

              const bx = b.x + b.w/2, by = b.y + b.h/2;

              return (

            </div>
            <div style={{display:'flex', flexDirection:'column', gap:4}}>
              {FLOW_TOP.map((f, i) => {
                const a = SPACES.find(s=>s.id===f.from);
                const b = SPACES.find(s=>s.id===f.to);
                const pct = f.count / maxFlow;
                const active = i === activePath;
                return (
                  <button key={i} onClick={()=>setActivePath(i)}
                    style={{
                      appearance:'none', cursor:'pointer', textAlign:'left',
                      background: active ? 'rgba(250,204,21,0.06)' : 'transparent',
                      border:`1px solid ${active ? 'rgba(250,204,21,0.3)' : 'var(--border)'}`,
                      borderRadius:10, padding:'10px 12px',
                      display:'flex', alignItems:'center', gap:12,
                      color:'var(--text)', fontFamily:'inherit',
                      position:'relative', overflow:'hidden'
                    }}>
                    <span className="mono" style={{
                      fontSize:11, width:22, color: i<3 ? 'var(--yellow)' : 'var(--text-3)',
                      fontWeight: i<3 ? 700 : 500
                    }}>{String(i+1).padStart(2,'0')}</span>

                    <div style={{display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0}}>
                      <span style={{fontSize:13, color:'var(--text)', fontWeight: active?600:500}}>{a?.name}</span>
                      <Icon name="chevron" size={11} style={{color:'var(--text-3)'}}/>
                      <span style={{fontSize:13, color:'var(--text)', fontWeight: active?600:500}}>{b?.name}</span>
                    </div>

                    <div style={{width:80, height:4, background:'var(--bg-2)', borderRadius:2, overflow:'hidden'}}>
                      <div style={{width:`${pct*100}%`, height:'100%',
                        background: active ? 'linear-gradient(90deg, #22D3EE, #FACC15)' : 'linear-gradient(90deg, #3B82F6, #22D3EE)'}}/>
                    </div>

                    <span className="mono" style={{
                      fontSize:13, fontWeight:700,
                      color: active ? 'var(--yellow)' : 'var(--text)',
                      minWidth:48, textAlign:'right'
                    }}>{f.count.toLocaleString()}</span>
                  </button>
                );
              })}
            </div>
          </div>
        ) : (
          <FlowMatrix matrix={flowMatrix} max={maxMatrix}/>
        )}
      </div>
    </div>
  );
};

window.FlowPanel = FlowPanel;
  </script>
  <!-- INSIGHTS -->

  return (

            }}>

            <span className="chip" style={{background:'rgba(139,92,246,0.1)', borderColor:'rgba(139,92,246,0.3)', color:'#A78BFA'}}>
              AI · 3건 감지
            </span>
          </div>
          <div className="card-caption">데이터 변화 패턴에서 공간 기획 관점의 해석을 자동 생성합니다</div>
        </div>
        <div style={{flex:1}}/>
        <button className="btn btn-ghost"><Icon name="refresh" size={13}/>재분석</button>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12}}>
        {INSIGHTS.map((it, i) => (
          <div key={i} style={{
            background:'var(--bg-2)',
            border:`1px solid ${color[it.kind]}33`,
            borderRadius:12, padding:16,
            position:'relative', overflow:'hidden'
          }}>
            <div style={{position:'absolute', top:0, left:0, right:0, height:2, background: color[it.kind], opacity:0.5}}/>
            <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
              <Icon name={icon[it.kind]} size={14} style={{color: color[it.kind]}}/>
              <span style={{fontSize:13, fontWeight:700, color:'var(--text)'}}>{it.title}</span>

              {it.body}

            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span className="mono" style={{fontSize:10, color:'var(--text-3)'}}>{it.meta}</span>
              <button className="btn btn-ghost" style={{padding:'4px 8px', fontSize:11}}>도면에서 보기 <Icon name="chevron" size={10}/></button>
            </div>
          </div>
        ))}

};

const KpiRow = () => {
  const kpis = [
    { label:'총 방문자', value:'11,230', sub:'명', trend:+12, spark:[30,45,40,60,50,70,65,80,75] },
    { label:'평균 체류시간', value:'34.7', sub:'분', trend:+6, spark:[20,30,25,40,35,50,45,55,60] },
    { label:'공간 활용률', value:'68', sub:'%', trend:+4, spark:[40,50,55,60,65,60,70,72,68] },
    { label:'이동 횟수', value:'8,420', sub:'회', trend:-2, spark:[60,55,70,65,60,55,50,48,52] },
    { label:'동시 재실 피크', value:'312', sub:'명 · 14:20', trend:+18, spark:[100,120,150,200,250,300,312,290,270] },
  ];
  return (
    <div style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:12, gridColumn:'span 12'}}>
      {kpis.map((k, i) => (
        <div key={i} className="card" style={{padding:'14px 16px'}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <span style={{fontSize:11, color:'var(--text-3)', fontWeight:500, letterSpacing:'0.03em'}}>{k.label}</span>
            <span className="mono" style={{fontSize:10, fontWeight:600, color: k.trend>=0 ? 'var(--cyan)' : '#F87171'}}>
              {k.trend>=0?'▲':'▼'} {Math.abs(k.trend)}%
            </span>
          </div>
          <div style={{display:'flex', alignItems:'baseline', gap:4, marginTop:6}}>
            <span className="mono" style={{fontSize:24, fontWeight:700, color:'var(--text)', letterSpacing:'-0.02em'}}>{k.value}</span>
            <span style={{fontSize:11, color:'var(--text-3)'}}>{k.sub}</span>
          </div>
          <svg width="100%" height="24" viewBox="0 0 100 24" preserveAspectRatio="none" style={{marginTop:4}}>
            <defs>
              <linearGradient id={`sg${i}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stopColor="#22D3EE" stopOpacity="0.4"/>
                <stop offset="1" stopColor="#22D3EE" stopOpacity="0"/>
              </linearGradient>
            </defs>
            {(() => {
              const max = Math.max(...k.spark), min = Math.min(...k.spark);
              const pts = k.spark.map((v,j) => [j*(100/(k.spark.length-1)), 22 - ((v-min)/(max-min||1))*20]);
              const d = pts.map((p,j) => `${j===0?'M':'L'} ${p[0]} ${p[1]}`).join(' ');
              const fill = `${d} L 100 24 L 0 24 Z`;
              return <>
                <path d={fill} fill={`url(#sg${i})`}/>
                <path d={d} stroke={k.trend>=0?'#22D3EE':'#F87171'} strokeWidth="1.5" fill="none"/>
                <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2" fill={k.trend>=0?'#22D3EE':'#F87171'}/>
              </>;
            })()}
          </svg>
        </div>
      ))}
    </div>
  );
};

Object.assign(window, { Insights, KpiRow });
  </script>
  <!-- TWEAKS -->
  <script type="text/babel" data-presets="react" id="mod-tweaks">
const TweakRow = ({label, children}) => (
  <div style={{marginBottom:12}}>
    <div style={{fontSize:11, color:'var(--text-3)', fontWeight:500, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.05em'}}>{label}</div>
    {children}
  </div>
);

const Tweaks = () => {
  const [visible, setVisible] = useState(false);
  const [tweaks, setTweaks] = useState(window.TWEAKS);

  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setVisible(true);
      if (d.type === '__deactivate_edit_mode') setVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const set = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    document.documentElement.dataset[key] = String(val);
    if (key === 'accent') {
      const map = { blue:'#3B82F6', violet:'#8B5CF6', cyan:'#22D3EE', emerald:'#10B981' };
      document.documentElement.style.setProperty('--primary', map[val] || map.blue);
    }
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]: val}}, '*');
  };

  if (!visible) return null;

  return (
    <div style={{
      position:'fixed', bottom:20, right:20, width:300, zIndex:999,
      background:'linear-gradient(180deg, #0F1629, #0B1120)',
      border:'1px solid var(--border-strong)',
      borderRadius:14, padding:16,
      boxShadow:'0 20px 60px rgba(0,0,0,0.6)',
      fontFamily:'inherit'
    }}>
      <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:14}}>
        <Icon name="settings" size={14} style={{color:'var(--cyan)'}}/>
        <div style={{fontSize:13, fontWeight:700}}>Tweaks</div>
        <div style={{flex:1}}/>
        <span className="chip mono" style={{fontSize:10}}>LIVE</span>
      </div>

      <TweakRow label="강조색">
        <div style={{display:'flex', gap:6}}>
          {[['blue','#3B82F6'],['violet','#8B5CF6'],['cyan','#22D3EE'],['emerald','#10B981']].map(([k,c]) => (
            <button key={k} onClick={()=>set('accent', k)}
              style={{
                width:28, height:28, borderRadius:8, cursor:'pointer',
                background:c,
                border:`2px solid ${tweaks.accent===k ? '#fff' : 'transparent'}`,
                boxShadow: tweaks.accent===k ? `0 0 0 2px ${c}44` : 'none'
              }}/>
          ))}
        </div>
      </TweakRow>

      <TweakRow label="히트맵 팔레트">
        <div className="seg" style={{width:'100%'}}>
          <button className={tweaks.heatmapStyle==='purple-yellow'?'active':''} onClick={()=>set('heatmapStyle','purple-yellow')} style={{flex:1}}>보라→노랑</button>
          <button className={tweaks.heatmapStyle==='cool'?'active':''} onClick={()=>set('heatmapStyle','cool')} style={{flex:1}}>블루</button>
        </div>
      </TweakRow>

      <TweakRow label="도면 그리드">
        <div className="seg">
          <button className={tweaks.showGrid?'active':''} onClick={()=>set('showGrid', true)}>ON</button>
          <button className={!tweaks.showGrid?'active':''} onClick={()=>set('showGrid', false)}>OFF</button>
        </div>
      </TweakRow>

      <TweakRow label="밀도">
        <div className="seg" style={{width:'100%'}}>
          <button className={tweaks.density==='compact'?'active':''} onClick={()=>set('density','compact')} style={{flex:1}}>컴팩트</button>
          <button className={tweaks.density==='comfortable'?'active':''} onClick={()=>set('density','comfortable')} style={{flex:1}}>보통</button>
        </div>
      </TweakRow>
    </div>
  );
};

window.Tweaks = Tweaks;
  </script>

  <script type="text/babel" data-presets="react" id="mod-app">
const App = () => {
  const [state, setState] = useState({
    floor: '6F',
    spaceType: 'all',
    days: [0,1,2,3,4],
    hourRange: [9, 21],
    metric: 'occupancy',
  });
  const dispatch = (patch) => setState(s => ({...s, ...patch}));

  const [hour, setHour] = useState(14);
  const [playing, setPlaying] = useState(false);
  const [selected, setSelected] = useState(null);
  const [compareMode, setCompareMode] = useState('off');

  useEffect(() => {
    const saved = localStorage.getItem('spatial-hour');
    if (saved) setHour(+saved);
  }, []);
  useEffect(() => {
    localStorage.setItem('spatial-hour', String(hour));
  }, [hour]);

  return (
    <div data-screen-label="01 공간 대시보드" style={{display:'flex', flexDirection:'column', minHeight:'100vh', position:'relative', zIndex:1}}>
      <Header
        playing={playing} setPlaying={setPlaying}
        currentHour={hour}
        compareMode={compareMode} setCompareMode={setCompareMode}
      />
      <div style={{display:'flex', flex:1, minHeight:0}}>
        <Sidebar state={state} dispatch={dispatch}/>
        <main style={{flex:1, padding:20, overflow:'auto', display:'grid', gridTemplateColumns:'repeat(12, 1fr)', gap:16, alignContent:'start'}}>
          <KpiRow/>
          <FloorHeatmap
            hour={hour} setHour={setHour}
            playing={playing} setPlaying={setPlaying}
            selected={selected} setSelected={setSelected}
          />
          <TimeGrid/>
          <DwellBars/>
          <FlowPanel/>
          <Insights/>
          <div className="mono" style={{gridColumn:'span 12', padding:'16px 4px', color:'var(--text-3)', fontSize:11, display:'flex', justifyContent:'space-between', borderTop:'1px solid var(--border)'}}>
            <span>SPATIAL.IQ v2.6 · 모든 데이터는 익명화 처리됨</span>
            <span>마지막 동기화 2026.04.22 09:41 KST</span>
          </div>
        </main>
      </div>
      <Tweaks/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
